<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>भगवद्गीता — अध्याय</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="adhyay-page">

  <!-- Site Header -->
  <header class="site-header">
    <a class="header-back" href="index.html" aria-label="मुख्यपानावर परत जा">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      मुख्यपान
    </a>
    <span class="om">🕉️</span>
    <span class="title">भगवद्गीता</span>
    <span class="header-spacer"></span>
    <span class="header-adhyay-label" id="header-adhyay-label"></span>
  </header>

  <div class="adhyay-body" id="adhyay-body">

    <!-- Adhyay summary image (shown when no concept selected) -->
    <div class="adhyay-summary-img" id="summary-img-section">
      <img id="summary-img" src="" alt="अध्याय सारांश" onerror="this.style.display='none'">
      <div class="img-placeholder" id="summary-placeholder">
        <span>🕉️</span>
        <span id="summary-placeholder-text">अध्याय सारांश चित्र</span>
      </div>
    </div>

    <!-- Concept selector (always visible on adhyay page) -->
    <div class="concept-selector-section" id="concept-selector-section" style="display:none">
      <div class="concept-selector-label">संकल्पना निवडा</div>
      <div class="concept-pills-track" id="concept-pills-track">
        <!-- Rendered by adhyay.js -->
      </div>
    </div>

    <!-- Concept view: image (left) + info (right) — shown when concept selected -->
    <div class="concept-view" id="concept-view">
      <div class="concept-img-wrap">
        <img id="concept-img" src="" alt="संकल्पना चित्र" onerror="this.style.display='none'">
        <div class="img-placeholder" id="concept-placeholder">
          <span id="concept-placeholder-emoji">🌅</span>
          <span>संकल्पना चित्र</span>
        </div>
      </div>
      <div class="concept-info">
        <div class="concept-info-header">
          <div class="info-emoji" id="concept-info-emoji"></div>
          <div class="concept-info-header-text">
            <div class="info-name" id="concept-info-name"></div>
            <div class="info-meta" id="concept-info-meta"></div>
          </div>
        </div>
        <div class="concept-info-body">
          <div class="concept-text" id="concept-text-content"></div>
        </div>
      </div>
    </div>

    <!-- PDF section -->
    <div class="pdf-section">
      <div class="pdf-section-label" id="pdf-label">अध्याय PDF</div>
      <div id="pdf-carousel-container"></div>
    </div>

  </div>

  <!-- PDF.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // Set worker path before any PDF loading
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
  <script src="js/data.js"></script>
  <script src="js/content.js"></script>
  <script src="js/pdf-carousel.js"></script>
  <script src="js/adhyay.js"></script>
</body>
</html>
