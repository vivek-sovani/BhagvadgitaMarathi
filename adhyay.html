<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>गीता-ज्ञानेश्वरी — आधुनिक जीवनदर्शन</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="adhyay-page">

  <!-- Site Header -->
  <header class="site-header">
    <a class="header-app-link" href="index.html" title="मुख्यपान">
      <span class="om">🕉️</span>
      <div class="header-app-text">
        <span class="title">गीता-ज्ञानेश्वरी</span>
        <span class="subtitle">आधुनिक जीवनदर्शन</span>
      </div>
    </a>
    <span class="header-spacer"></span>
    <button class="header-suchi-btn" id="header-suchi-btn" title="संकल्पना सूची">संकल्पना सूची</button>
    <button class="header-adhyay-label" id="header-adhyay-label" title="अध्याय पानावर परत जा"></button>
  </header>

  <div class="adhyay-body" id="adhyay-body">

    <!-- Mobile-only home link (above image) -->
    <a class="cover-home-link-mobile" href="index.html" aria-label="मुख्यपानावर जा">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      मुख्यपान
    </a>

    <!-- Adhyay summary image + text (shown when no concept selected) -->
    <div id="summary-img-section">
      <div class="adhyay-summary-img">
        <img id="summary-img" src="" alt="अध्याय सारांश">
        <div class="img-placeholder" id="summary-placeholder">
          <span>🕉️</span>
          <span id="summary-placeholder-text">अध्याय सारांश चित्र</span>
        </div>
        <div class="adhyay-cover-title" id="adhyay-cover-title">
          <span class="act-num" id="act-num"></span>
          <span class="act-name" id="act-name"></span>
        </div>
      </div>
      <div class="adhyay-summary-text" id="adhyay-summary-text" style="display:none">
        <a class="cover-home-link" href="index.html" aria-label="मुख्यपानावर जा">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          मुख्यपान
        </a>
        <div class="summary-adhyay-label" id="summary-adhyay-label"></div>
        <p class="summary-adhyay-desc" id="summary-adhyay-desc"></p>
        <div class="summary-concept-list" id="summary-concept-list"></div>
      </div>
    </div>

    <!-- Current concept title bar — shown above concept view -->
    <div class="concept-title-bar" id="concept-title-bar" style="display:none">
      <button class="ctb-back" id="ctb-back-btn" title="अध्याय पानावर परत जा">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        अध्याय
      </button>
      <span class="ctb-divider"></span>
      <span class="ctb-meta" id="ctb-meta"></span>
      <span class="ctb-name" id="ctb-name"></span>
    </div>

    <!-- Concept view: image (left) + info (right) — shown when concept selected -->
    <div class="concept-view" id="concept-view">
      <div class="concept-img-wrap">
        <img id="concept-img" src="" alt="संकल्पना चित्र" onerror="this.style.display='none'">
        <div class="img-placeholder" id="concept-placeholder">
          <span id="concept-placeholder-emoji">🌅</span>
          <span>संकल्पना चित्र</span>
        </div>
      </div>
      <div class="concept-info">
        <div class="concept-info-header">
          <div class="info-emoji" id="concept-info-emoji"></div>
          <div class="concept-info-header-text">
            <div class="info-name" id="concept-info-name"></div>
            <div class="info-meta" id="concept-info-meta"></div>
          </div>
          <!-- Font size control -->
          <div class="font-size-ctrl" id="font-size-ctrl">
            <button class="fsc-btn" data-size="normal" title="सामान्य">A</button>
            <button class="fsc-btn" data-size="large"  title="मोठा">A+</button>
            <button class="fsc-btn" data-size="xlarge" title="अधिक मोठा">A++</button>
          </div>
        </div>
        <div class="concept-info-body">

          <!-- ── Section menu (4 cards) — default view when concept selected ── -->
          <div class="section-menu" id="section-menu" style="display:none">
            <p class="smenu-summary" id="smenu-summary" style="display:none"></p>
            <button class="smenu-card" data-section="vivechan">
              <div class="smenu-icon-wrap">🪔</div>
              <div class="smenu-text">
                <div class="smenu-title">ज्ञानेश्वर महाराज काय म्हणतात</div>
                <div class="smenu-sub">श्लोक व ज्ञानेश्वरी विवेचन</div>
              </div>
              <div class="smenu-arrow">→</div>
            </button>
            <button class="smenu-card smenu-katha" id="smenu-katha-card" data-section="katha" style="display:none">
              <div class="smenu-icon-wrap">🌿</div>
              <div class="smenu-text">
                <div class="smenu-title">आयुष्यातील क्षण</div>
                <div class="smenu-sub">जीवनकथेद्वारा</div>
              </div>
              <div class="smenu-arrow">→</div>
            </button>
            <button class="smenu-card" data-section="sadarikaran">
              <div class="smenu-icon-wrap">🖼️</div>
              <div class="smenu-text">
                <div class="smenu-title">चित्ररूपी सादरीकरण</div>
                <div class="smenu-sub">संकल्पना PDF</div>
              </div>
              <div class="smenu-arrow">→</div>
            </button>
            <button class="smenu-card smenu-disabled" disabled>
              <div class="smenu-icon-wrap">🎧</div>
              <div class="smenu-text">
                <div class="smenu-title">श्रवण</div>
                <div class="smenu-sub">लवकरच येत आहे…</div>
              </div>
            </button>
          </div>

          <!-- ── Back bar — shown when a section content is active ── -->
          <div class="section-back-bar" id="section-back-bar" style="display:none">
            <button class="sbb-back" id="section-back-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              मागे
            </button>
            <span class="sbb-title" id="section-back-title"></span>
          </div>

          <!-- ── Section content panels ── -->
          <div class="section-content" id="section-vivechan" style="display:none">
            <div class="concept-text" id="concept-text-content"></div>
            <div class="section-bottom-nav" id="snav-vivechan"></div>
          </div>
          <div class="section-content" id="section-katha" style="display:none">
            <div class="concept-story" id="concept-story-content"></div>
            <div class="section-bottom-nav" id="snav-katha"></div>
          </div>
          <div class="section-content" id="section-sadarikaran" style="display:none">
            <div id="sadarikaran-content"></div>
            <div class="section-bottom-nav" id="snav-sadarikaran"></div>
          </div>
          <div class="section-content" id="section-shravan" style="display:none">
            <div id="shravan-content"></div>
            <div class="section-bottom-nav" id="snav-shravan"></div>
          </div>

        </div>
      </div>
    </div>

    <!-- Adhyay PDF inline viewer -->
    <div class="pdf-open-bar">
      <div class="story-pdf-viewer adhyay-pdf-viewer">
        <div class="story-pdf-viewer-label" id="pdf-label">📄 अध्याय सादरीकरण</div>
        <div class="story-pdf-pages" id="adhyay-pdf-pages">
          <div class="story-pdf-loading">PDF लोड होत आहे…</div>
        </div>
        <div class="story-pdf-swipe-hint">← स्वाइप करून पाने पहा →</div>
      </div>
    </div>

  </div>

  <!-- PDF Modal (desktop: iframe; mobile: new tab) -->
  <div class="pdf-modal" id="pdf-modal" role="dialog" aria-modal="true" aria-label="PDF दर्शक">
    <div class="pdf-modal-header">
      <span class="pdf-modal-title" id="pdf-modal-title">PDF</span>
      <button class="pdf-modal-close" id="pdf-modal-close" aria-label="बंद करा">✕</button>
    </div>
    <div class="pdf-modal-body">
      <iframe id="pdf-iframe" src="" title="PDF दर्शक" allowfullscreen></iframe>
    </div>
  </div>
  <div class="pdf-modal-backdrop" id="pdf-modal-backdrop"></div>

  <!-- PDF.js (only for thumbnail preview) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'js/pdf.worker.min.js';
    }
  </script>
  <!-- Sticky bottom concept navigation -->
  <nav class="bottom-concept-nav" id="bottom-concept-nav" style="display:none">
    <button class="bnav-btn bnav-prev" id="prev-concept-btn" disabled aria-label="मागील संकल्पना">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      <span id="bnav-prev-name"></span>
    </button>
    <div class="bnav-divider"></div>
    <button class="bnav-btn bnav-next" id="next-concept-btn" disabled aria-label="पुढील संकल्पना">
      <span id="bnav-next-name"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/content.js"></script>
  <script src="js/stories.js"></script>
  <script src="js/triggers.js"></script>
  <script src="js/adhyay.js"></script>
</body>
</html>
