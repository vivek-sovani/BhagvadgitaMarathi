<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>गीता-ज्ञानेश्वरी — आधुनिक जीवनदर्शन</title>
  <meta name="description" content="गीता-ज्ञानेश्वरी — आधुनिक जीवनदर्शन">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="home-page">

  <!-- Site Header -->
  <header class="site-header">
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="अध्याय मेनू">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="om">🕉️</span>
    <span class="title">गीता-ज्ञानेश्वरी — आधुनिक जीवनदर्शन</span>
  </header>

  <!-- Left Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">अध्याय निवडा</span>
      <button class="sidebar-close" id="sidebar-close" aria-label="बंद करा">✕</button>
    </div>
    <div class="sidebar-list" id="adhyay-list"></div>
  </div>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <!-- Home: 2-column layout (portrait image + adhyay menu) -->
  <div class="home-layout">
    <div class="home-portrait">
      <img src="assets/home-banner-potrait.jpg" alt="श्रीमद्भगवद्गीता" fetchpriority="high">
    </div>
    <div class="home-adhyay-panel" id="home-adhyay-panel">
      <div class="home-panel-label">भगवद्गीता · ज्ञानेश्वरी</div>
      <div class="home-panel-title">आधुनिक जीवनात गीतेचा प्रत्यक्ष उपयोग</div>
      <div class="home-adhyay-list" id="home-adhyay-list"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
