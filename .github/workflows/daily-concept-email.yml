name: Daily Gita Concept Email

on:
  schedule:
    - cron: '15 23 * * *'   # 11:15 PM UTC = 4:45 AM IST every day
  workflow_dispatch:          # allow manual trigger from GitHub Actions tab

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send daily concept email
        run: python scripts/send_daily_concept.py
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
